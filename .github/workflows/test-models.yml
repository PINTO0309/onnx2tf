name: Model Convert Test

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  conversion-test:
    runs-on: ubuntu-latest
    steps:
    - name: Check space before cleanup
      run: df -h
    - name: Clean space
      run: |
          docker images
          sudo rm -rf "/opt/*" || true
          sudo rm -rf "/usr/share/dotnet" || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo rm -rf "/usr/local/lib/android" || true
          sudo rm -rf "/usr/local/share/boost" || true
          sudo rm -rf "/usr/lib/jvm" || true
          sudo rm -rf "/usr/share/swift" || true
          sudo rm -rf "/usr/local/julia*" || true
          sudo rm -rf "/usr/share/kotlinc" || true
          sudo rm -rf "/usr/local/share/edge_driver" || true
          sudo rm -rf "/usr/local/share/chromedriver-linux64" || true
          sudo rm -rf "/usr/local/share/gecko_driver" || true
          sudo rm -rf "/usr/share/miniconda" || true
          sudo rm -rf "/usr/local/share/phantomjs*" || true
          sudo rm -rf "/usr/share/sbt" || true
          sudo rm -rf "/usr/local/sqlpackage" || true
          sudo npm uninstall bazel
          rustup self uninstall -y
          sudo apt purge \
            ansible \
            apache2 \
            aria2 \
            azure-cli \
            cabal* \
            clang* \
            dotnet-sdk* \
            firefox \
            ghc* \
            google-chrome-stable \
            google-cloud-sdk \
            kubectl \
            libpq-dev \
            microsoft-edge-stable \
            moby-buildx \
            moby-cli \
            moby-compose \
            moby-engine \
            mongodb* \
            mono-complete \
            mysql* \
            nginx \
            node* \
            npm* \
            nuget \
            php* \
            postgresql* \
            powershell \
            r-base \
            rpm \
            ruby* \
            sphinxsearch \
            subversion \
            yarn \
            -yq >/dev/null 2>&1 || true
          sudo apt-get autoremove -y >/dev/null 2>&1 || true
          sudo apt-get autoclean -y >/dev/null 2>&1 || true
          df -h
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c
      with:
        swap-size-gb: 13
    - name: Checkout onnx2tf
      uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        sudo apt-get update >/dev/null 2>&1
        sudo env DEBIAN_FRONTEND=noninteractive apt-get install -yq flatbuffers-compiler >/dev/null 2>&1
        flatc --version
        pip install pip -U
        pip install cmake==3.26.4
        pip install psutil==5.9.5
        pip install onnx==1.20.1
        pip install onnxruntime==1.24.1
        pip install tensorflow==2.19.0
        pip install ai_edge_litert==2.1.2
        pip install protobuf==4.25.5
        pip install onnxsim-prebuilt==0.4.39.post2
        pip install sne4onnx
        pip install sng4onnx
        pip install ml_dtypes==0.5.1
        pip install tf-keras==2.19.0
        pip install flatbuffers>=23.5.26
        pip install -e .
    - name: Download models
      run: |
        curl "https://s3.us-central-1.wasabisys.com/onnx2tf-en/models/resources.tar.gz" -o resources.tar.gz
        tar -zxvf resources.tar.gz
        rm resources.tar.gz
    - name: Run Model Convert Tests (tf_converter)
      run: |
        python tests/test_model_convert.py \
          -m models \
          -o wiki \
          -v \
          --tflite-backend tf_converter \
          --report-filename model_status_tf_converter.md \
          --preserve-model-files
    - name: Prefetch schema.fbs for flatbuffer_direct
      run: |
        python - <<'PY'
        import subprocess
        from pathlib import Path
        from onnx2tf.utils.common_functions import get_tflite_schema_fbs_url

        schema_url = get_tflite_schema_fbs_url()
        schema_path = Path("wiki") / "test_model_pb" / "schema.fbs"
        schema_path.parent.mkdir(parents=True, exist_ok=True)
        print(f"Downloading schema.fbs from: {schema_url}")
        subprocess.check_call(["curl", "-fL", schema_url, "-o", str(schema_path)])
        print(f"Saved: {schema_path}")
        PY
    - name: Run Model Convert Tests (flatbuffer_direct)
      run: |
        python tests/test_model_convert.py \
          -m models \
          -o wiki \
          -v \
          --tflite-backend flatbuffer_direct \
          --report-filename model_status_flatbuffer_direct.md \
          --preserve-model-files \
          --not-use-onnxsim
    - name: Merge wiki reports
      run: |
        python - <<'PY'
        from pathlib import Path
        wiki_dir = Path("wiki")
        tf_report = wiki_dir / "model_status_tf_converter.md"
        fd_report = wiki_dir / "model_status_flatbuffer_direct.md"
        merged = wiki_dir / "model_status.md"
        tf_body = tf_report.read_text() if tf_report.exists() else "_No tf_converter report generated._"
        fd_body = fd_report.read_text() if fd_report.exists() else "_No flatbuffer_direct report generated._"
        merged.write_text(
            "# Model Convert Status\n\n"
            "## tf_converter\n\n"
            f"{tf_body}\n\n"
            "## flatbuffer_direct\n\n"
            f"{fd_body}\n"
        )
        PY
    - name: Update wiki content
      uses: Andrew-Chen-Wang/github-wiki-action@v4
      continue-on-error: true
      with:
        path: wiki/
        ignore: |
          test_model_pb/
